name: cascadia_Testenv
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.10

  # core scientific stack
  - numpy
  - scipy
  - pandas
  - scikit-learn

  # proteomics / parsing
  - pyteomics
  - lxml
  - pyyaml
  - pydantic
  - click
  - tqdm

  # utilities
  - matplotlib
  - networkx
  - setuptools
  - wheel
  - packaging
  - h5py
  - hdf5plugin

  # GPU PyTorch stack
  - pytorch
  - pytorch-cuda=11.8

pip:
  - cascadia==0.0.7
  - pytorch-lightning>=1.9,<2.0
  - torchmetrics<1.0