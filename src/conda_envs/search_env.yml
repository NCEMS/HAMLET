name: search_env
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python
  - python>=3.10
  - pip
  
  # Java runtime for PTM-Shepherd and Fragpipe
  - openjdk=17
  
  # Search tools available via conda
  - sage                                 # Peptide database search
  - nextflow                             # Workflow engine
  - pandas                               # Data processing for search result parsing
  - pyarrow                              # Parquet format support for DIA-NN results conversion
  
  # Database and conversion tools
  - sqlite>=3.40.0
  
  # Utilities
  - curl>=7.80.0
  - unzip>=6.0
  - wget>=1.20.0

  # Parquet handling for search result post-processing
  - pyarrow                              # Parquet format support
  - fastparquet