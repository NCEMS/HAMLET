name: meti_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core Python
  - python>=3.10
  - pip
  
  # Data processing & analysis
  - pandas>=1.5.0
  - numpy>=1.23.0
  - scipy>=1.9.0
  - scikit-learn>=1.1.0
  - matplotlib>=3.5.0
  
  # File conversion & handling
  - bioconda::thermorawfileparser
  - pyteomics>=4.5.0
  - requests>=2.28.0
  - pyyaml>=6.0
  - lxml>=4.9.0
  - pydantic>=1.10.0
  
  # Download/Networking tools
  - aria2>=1.36.0
  - wget>=1.20.0
  
  # Proteomics-specific
  - networkx>=2.8.0
  - bioconda::snakemake>=7.0             # For Peptonizer2000 workflow
  
  # Workflow engine
  - nextflow                             # Nextflow workflow engine
  
  # Search tool runtimes (binaries installed separately)
  - openjdk=17                          # For PTM-Shepherd JAR
  - dotnet-runtime=8.0                  # For DIA-NN .NET application
  
  # Utilities
  - click>=8.1.0
  - tqdm>=4.64.0
  - joblib>=1.2.0
  - jsonschema>=4.17.0
  - importlib-metadata>=5.0.0
  
  # Pip dependencies (for packages not in conda)
  - pip:
    - openai>=0.27.0
    - tenacity>=8.2.0                   # For LLM retries
    - langchain>=0.0.300
    - langchain-openai>=0.0.1
    - aiofiles>=23.0.0
    - aiohttp>=3.8.0
    - rbo>=0.1.0                        # For Peptonizer2000 ranking algorithms

