name: aMEW
channels:
  - pytorch
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core Python and numerical
  - python=3.11
  - numpy<2
  - scipy
  - pandas
  - scikit-learn
  - matplotlib
  - seaborn
  - setuptools
  - pip
  
  # PyTorch with CUDA - pin to versions compatible with Cascadia/Casanovo
  - pytorch::pytorch=2.0.1
  - pytorch::torchvision=0.15.2
  - pytorch::torchaudio=2.0.2
  
  # Machine learning tools - pin to compatible versions
  - pytorch-lightning=2.0.9
  - tensorboard
  
  # Mass spectrometry and proteomics
  - pyteomics
  - pymzml
  - spectrum_utils
  - lxml
  - requests
  
  # Development utilities
  - git
  - wget
  - curl
  - vim
  - nano
